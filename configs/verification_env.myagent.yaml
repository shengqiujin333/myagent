version: 1
name: "myagent-local-verification-env"

hardware:
  serial:
    kind: "uart-console"
    purpose:
      - "capture firmware logs"
      - "send host-side test commands when the firmware protocol supports it"
    port_selection:
      mode: "negotiate"
      configured_port: "auto"
      user_may_provide_port: true
      candidate_ports:
        - "COM25"
      discovery_examples:
        powershell: "Get-CimInstance Win32_SerialPort | Select-Object DeviceID,Name"
        python: "python -m serial.tools.list_ports"
    default_baudrate: 115200
    timeout_sec: 30
    usage_examples:
      read_log: "python host_tests/read_serial.py --port <PORT> --baud 115200 --seconds 10"
      smoke_test: "python host_tests/smoke_test.py --port <PORT> --baud 115200"

  cmsis_dap:
    kind: "debug-probe"
    probe: "CMSIS-DAP"
    transport: "swd"
    purpose:
      - "flash firmware"
      - "reset target"
      - "run OpenOCD GDB server for debug"
    note: "Use OpenOCD for STM32G030F6P6. pyOCD target download is not available in this environment."
    openocd:
      executable: "D:/software/openocd/xpack/xpack/bin/openocd.exe"
      cmsis_dap_backend: "hid"
      interface_cfg: "interface/cmsis-dap.cfg"
      target_cfg: "target/stm32g0x.cfg"
      firmware_path: "battery_re/MDK-ARM/battery_re.axf"
      timeout_sec: 120
      examples:
        flash_axf: "openocd -f interface/cmsis-dap.cfg -f target/stm32g0x.cfg -c \"program battery_re/MDK-ARM/battery_re/battery_re.axf verify reset exit\""
        reset_run: "openocd -f interface/cmsis-dap.cfg -f target/stm32g0x.cfg -c \"init; reset run; shutdown\""
        gdb_server: "openocd -f interface/cmsis-dap.cfg -f target/stm32g0x.cfg -c \"init\""
    gdb:
      executable: "arm-none-eabi-gdb"
      server_address: "localhost:3333"
      timeout_sec: 120
      examples:
        connect: "arm-none-eabi-gdb battery_re/MDK-ARM/battery_re/battery_re.axf -ex \"target extended-remote localhost:3333\""

software:
  shell:
    kind: "powershell"
    purpose:
      - "run build commands"
      - "run OpenOCD commands"
      - "run host-side Python scripts"

  mdk:
    kind: "keil-mdk"
    uv4_exe: "C:/Keil_v5/UV4/UV4.exe"
    project_file: "battery_re/MDK-ARM/battery_re.uvprojx"
    log_file: "battery_re/MDK-ARM/build_log.txt"
    timeout_sec: 300
    examples:
      build: "\"C:\\Keil_v5\\UV4\\UV4.exe\" -j0 -b \"battery_re\\MDK-ARM\\battery_re.uvprojx\" -o \"battery_re\\MDK-ARM\\build_log.txt\""
      rebuild: "\"C:\\Keil_v5\\UV4\\UV4.exe\" -j0 -r \"battery_re\\MDK-ARM\\battery_re.uvprojx\" -o \"battery_re\\MDK-ARM\\build_log.txt\""

  python:
    kind: "host-side-test-runtime"
    executable: "python"
    package_install:
      policy: "allow"
      command_template: "python -m pip install <packages>"
      scope: "current Python environment"
      note: "The agent may install Python libraries needed for host-side debug and HIL tests through shell."
    purpose:
      - "write small serial/debug helper scripts"
      - "run host-side protocol tests"
      - "analyze captured logs"
    typical_libraries:
      - "pyserial"
      - "pytest"
      - "numpy"
      - "matplotlib"
    examples:
      run_script: "python host_tests/smoke_test.py --port <PORT> --baud 115200"
      run_pytest: "python -m pytest host_tests -q"

  system_package_manager:
    kind: "system-package-manager"
    name: "Chocolatey"
    executable: "choco"
    package_install:
      policy: "allow"
      timeout_sec: 600
      scope: "system-wide; embedded-agent must run from an elevated PowerShell"
    packages:
      openocd:
        package: "openocd"
        executable: "D:/software/openocd/xpack/xpack/bin/openocd.exe"
        version_command: "& 'D:/software/openocd/xpack/xpack/bin/openocd.exe' --version"
      gcc-arm-embedded:
        package: "gcc-arm-embedded"
        executable: "arm-none-eabi-gdb"
        version_command: "arm-none-eabi-gdb --version"
      cmake:
        package: "cmake"
        executable: "cmake"
        version_command: "cmake --version"
      ninja:
        package: "ninja"
        executable: "ninja"
        version_command: "ninja --version"
      make:
        package: "make"
        executable: "make"
        version_command: "make --version"
