project_root: "C:/Users/123/Desktop/neizu/tasknew"
run_root: "runs"
entrypoint: "main"
context_file_limit: 200
llm:
  provider: "deepseek"
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.2
  timeout_sec: 120
  max_tokens: 4096
hardware:
  build_command: "cmake --build build"
  flash_command: "pyocd flash -t stm32f103c8 build/firmware.elf"
  flash_timeout_sec: 120
  serial_port: "COM3"
  serial_baudrate: 115200
  serial_timeout_sec: 30
  host_test_command: "python host_tests/smoke_test.py --port COM7 --baud 115200"
  host_test_timeout_sec: 120
  max_attempts: 10
