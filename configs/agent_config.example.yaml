project_root: "C:/path/to/firmware"
run_root: "runs"
entrypoint: "main"
context_file_limit: 200
max_task_attempts: 5
verification_env_file: "configs/verification_env.example.yaml"
llm:
  provider: "deepseek"
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.2
  timeout_sec: 120
  max_tokens: 4096
